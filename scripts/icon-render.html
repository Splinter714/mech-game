<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mech icon render</title>
    <style>html,body{margin:0;background:#0d1014}</style>
  </head>
  <body>
    <!--
      Off-screen render harness for the PWA app icon. Loaded headless by
      scripts/gen-icons.mjs through a programmatic Vite dev server so the REAL
      procedural art pipeline (src/art/*) resolves via ESM. It boots a tiny Phaser
      scene, builds the default player mech's textures with the shipping art code,
      composites hull + arms + side torsos + turret onto a dark-background canvas,
      and exposes window.__renderIcon(size, { maskable }) for Playwright to snapshot.
    -->
    <script type="module">
      import Phaser from 'phaser';
      import {
        buildMechTextures,
        mechLayout,
        DESIGN,
        ART_SCALE,
        SIDE_TORSO_LOCATIONS,
        ARM_LOCATIONS,
        partSpriteTransform,
      } from '/src/art/mechArt.js';
      import { Mech } from '/src/data/Mech.js';
      import { ROSTERS, ACTIVE_MECH_KEY } from '/src/data/rosters.js';

      // The shipping default build — same mech the garage opens with.
      const buildData = ROSTERS.mech.defaultRoster()[ACTIVE_MECH_KEY];
      const mech = new Mech(buildData);
      const KEY = 'iconMech';

      class IconScene extends Phaser.Scene {
        constructor() { super('IconScene'); }
        create() {
          buildMechTextures(this, KEY, mech, { theme: 'player' });
          this.scene.pause();
          window.__ready = true;
        }
      }

      // A hidden Phaser instance just to own the texture manager + WebGL/canvas render.
      const game = new Phaser.Game({
        type: Phaser.AUTO,
        width: 8, height: 8,
        parent: document.createElement('div'),
        backgroundColor: '#0d1014',
        scene: IconScene,
        banner: false,
        audio: { noAudio: true },
      });

      // Draw the assembled mech (in the same stacking order the arena uses) into an
      // off-screen canvas of `size`, filled with the game's dark background. `maskable`
      // adds safe-zone padding so the round maskable crop never clips the mech.
      window.__renderIcon = (size, { maskable = false } = {}) => {
        const scene = game.scene.getScene('IconScene');
        const tex = (k) => scene.textures.get(k).getSourceImage();

        const cv = document.createElement('canvas');
        cv.width = size; cv.height = size;
        const ctx = cv.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // Dark background.
        ctx.fillStyle = '#0d1014';
        ctx.fillRect(0, 0, size, size);

        // The mech textures are drawn on a DESIGN*ART_SCALE grid, centred, pointing up.
        // We composite them at a display scale that fits DESIGN into the icon, minus a
        // margin (bigger for maskable so it survives the safe-zone circle crop).
        const margin = maskable ? 0.16 : 0.14;    // fraction of the icon on each side
        const fit = size * (1 - 2 * margin);       // px the mech may fill
        // Match the arena's sprite convention exactly: a texture (DESIGN*ART_SCALE px)
        // shown at Phaser display scale S occupies DESIGN*ART_SCALE*S px, and
        // partSpriteTransform's dx/dy offsets are computed in that same S. So pick S to
        // fit DESIGN into `fit`, and feed the SAME S to the transform.
        const S = fit / (DESIGN * ART_SCALE);
        const disp = DESIGN * ART_SCALE * S;       // displayed sprite size in icon px
        // Centre horizontally; nudge the mech UP from vertical centre so it sits higher
        // in the square (leaves the downward muzzles room without floating in the middle).
        // Maskable is centred (a round crop reads best with the mech dead-centre); the
        // full-bleed square keeps the slight upward nudge so the muzzles have room below.
        const cx = size / 2, cy = size / 2 - size * (maskable ? 0.04 : 0.12);
        const angle = Math.PI / 2;                 // aim straight down (south)

        const blit = (img, dx, dy, rot, ox, oy) => {
          ctx.save();
          ctx.translate(cx + dx, cy + dy);
          ctx.rotate(rot);
          ctx.drawImage(img, -ox * disp, -oy * disp, disp, disp);
          ctx.restore();
        };

        // Hull (walk frame 0), then pivoting side torsos + arms, then the body turret on
        // top — the same back-to-front order buildMechTextures / the arena rely on.
        blit(tex(`${KEY}_hull_0`), 0, 0, angle + Math.PI / 2, 0.5, 0.5);
        for (const loc of [...SIDE_TORSO_LOCATIONS, ...ARM_LOCATIONS]) {
          const t = partSpriteTransform(mech, loc, angle, S);
          blit(tex(`${KEY}_${loc}`), t.dx, t.dy, t.rot, t.ox, t.oy);
        }
        blit(tex(`${KEY}_turret`), 0, 0, angle + Math.PI / 2, 0.5, 0.5);

        return cv.toDataURL('image/png');
      };
    </script>
  </body>
</html>
